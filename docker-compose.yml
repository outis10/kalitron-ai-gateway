version: "3.9"

services:
  api:
    build:
      context: .
      target: runtime
    image: ai-gateway:latest
    container_name: ai-gateway
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/v1/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      - ./app:/app/app  # remove in production for immutable image

  # Uncomment to add a Redis queue for HUMAN_REVIEW documents
  # redis:
  #   image: redis:7-alpine
  #   container_name: ai-gateway-redis
  #   ports:
  #     - "6379:6379"
  #   restart: unless-stopped
